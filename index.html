<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AWE 2026 Long Beach — 출장 보고서</title>
<style>
:root {
  --bg:#0f0f14; --bg2:#1a1a24; --bg3:#22223a;
  --ac:#6366f1; --ac2:#818cf8;
  --tx:#e4e4ec; --tx2:#9ca3af;
  --gn:#22c55e; --gd:#f59e0b; --cy:#06b6d4; --pk:#ec4899; --pp:#a78bfa; --rd:#ef4444;
  --r:12px; --sh:0 4px 24px rgba(0,0,0,.45);
}
[data-theme=light]{
  --bg:#f5f5f7; --bg2:#ffffff; --bg3:#e8e8f0;
  --tx:#1a1a2e; --tx2:#555577;
  --sh:0 4px 24px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;transition:background .3s,color .3s}
a{color:var(--ac2);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Splash ── */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s}
#splash.hide{opacity:0;pointer-events:none}
.splash-logo{font-size:3rem;font-weight:800;color:var(--ac);letter-spacing:-1px;animation:fadeUp .8s .2s both}
.splash-sub{color:var(--tx2);margin-top:.5rem;animation:fadeUp .8s .5s both}
.splash-bar{width:200px;height:3px;background:var(--bg3);border-radius:2px;margin-top:2rem;animation:fadeUp .8s .7s both;overflow:hidden}
.splash-fill{height:100%;background:var(--ac);animation:fill 1.4s .8s forwards}
@keyframes fill{from{width:0}to{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ── Header ── */
header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--bg3);display:flex;align-items:center;padding:.75rem 1.5rem;gap:1rem}
.logo{font-size:1.1rem;font-weight:700;color:var(--ac);white-space:nowrap}
nav{flex:1;overflow-x:auto;display:flex;gap:.25rem;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.tab-btn{background:none;border:none;color:var(--tx2);padding:.45rem .85rem;border-radius:8px;cursor:pointer;white-space:nowrap;font-size:.88rem;transition:background .2s,color .2s}
.tab-btn:hover{background:var(--bg3);color:var(--tx)}
.tab-btn.active{background:var(--ac);color:#fff;font-weight:600}
.theme-btn{background:none;border:1px solid var(--bg3);color:var(--tx);padding:.4rem .75rem;border-radius:8px;cursor:pointer;font-size:.85rem;white-space:nowrap}
.theme-btn:hover{background:var(--bg3)}

/* ── Main ── */
main{max-width:820px;margin:0 auto;padding:2rem 1.5rem}
.tab{display:none;animation:fadeUp .4s both}
.tab.active{display:block}

/* ── Section headings ── */
h2{font-size:1.5rem;font-weight:700;margin-bottom:1.25rem;padding-bottom:.5rem;border-bottom:2px solid var(--ac)}
h3{font-size:1.1rem;font-weight:600;margin:1.5rem 0 .75rem;color:var(--ac2)}

/* ── Cards ── */
.card{background:var(--bg2);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--sh);border:1px solid var(--bg3)}
.card-title{font-weight:600;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.card p{color:var(--tx2);font-size:.9rem;line-height:1.7}

/* ── Badge / tag ── */
.badge{display:inline-block;padding:.2rem .6rem;border-radius:20px;font-size:.75rem;font-weight:600}
.b-ac{background:rgba(99,102,241,.2);color:var(--ac2)}
.b-gn{background:rgba(34,197,94,.15);color:var(--gn)}
.b-gd{background:rgba(245,158,11,.15);color:var(--gd)}
.b-cy{background:rgba(6,182,212,.15);color:var(--cy)}
.b-pk{background:rgba(236,72,153,.15);color:var(--pk)}
.b-rd{background:rgba(239,68,68,.15);color:var(--rd)}

/* ── Day collapsible ── */
.day{margin-bottom:.75rem;border-radius:var(--r);overflow:hidden;border:1px solid var(--bg3)}
.day-hdr{background:var(--bg2);padding:1rem 1.25rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;transition:background .2s}
.day-hdr:hover{background:var(--bg3)}
.day-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.day-body.open{max-height:5000px}
.event{padding:.75rem 1.25rem;border-top:1px solid var(--bg3);display:flex;gap:.75rem;align-items:flex-start}
.event-time{color:var(--tx2);font-size:.8rem;white-space:nowrap;min-width:50px;padding-top:.15rem}
.dot{width:10px;height:10px;border-radius:50%;margin-top:.35rem;flex-shrink:0}
.dot-gn{background:var(--gn)}
.dot-gd{background:var(--gd)}
.dot-cy{background:var(--cy)}
.dot-pk{background:var(--pk)}
.dot-ac{background:var(--ac)}
.event-info{}
.event-title{font-size:.92rem;font-weight:500}
.event-desc{font-size:.82rem;color:var(--tx2);margin-top:.25rem;line-height:1.6}

/* ── Photo grid ── */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem;margin:.75rem 0}
.photo-grid img{width:100%;border-radius:8px;object-fit:cover;aspect-ratio:4/3;background:var(--bg3)}
.photo-placeholder{width:100%;aspect-ratio:4/3;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:.8rem;border:2px dashed var(--bg3)}

/* ── Stats row ── */
.stats{display:flex;gap:1rem;flex-wrap:wrap;margin:1rem 0}
.stat{background:var(--bg2);border-radius:var(--r);padding:1rem 1.5rem;flex:1;min-width:120px;text-align:center;border:1px solid var(--bg3)}
.stat-val{font-size:1.8rem;font-weight:700;color:var(--ac)}
.stat-lbl{font-size:.8rem;color:var(--tx2);margin-top:.25rem}

/* ── Highlight box ── */
.hl{background:rgba(99,102,241,.08);border-left:3px solid var(--ac);padding:1rem 1.25rem;border-radius:0 var(--r) var(--r) 0;margin:1rem 0}
.hl-gn{background:rgba(34,197,94,.08);border-left-color:var(--gn)}
.hl-gd{background:rgba(245,158,11,.08);border-left-color:var(--gd)}
.hl-pk{background:rgba(236,72,153,.08);border-left-color:var(--pk)}

/* ── Table ── */
table{width:100%;border-collapse:collapse;font-size:.88rem;margin:.75rem 0}
th{background:var(--bg3);padding:.6rem .9rem;text-align:left;font-weight:600}
td{padding:.6rem .9rem;border-top:1px solid var(--bg3)}
tr:hover td{background:var(--bg3)}

/* ── Checklist ── */
.checklist{list-style:none;display:flex;flex-direction:column;gap:.5rem}
.checklist li{display:flex;align-items:flex-start;gap:.6rem;font-size:.9rem;color:var(--tx2)}
.checklist li::before{content:"☐";color:var(--ac);font-size:1rem;flex-shrink:0}
.checklist li.done::before{content:"☑";color:var(--gn)}

/* ── Responsive ── */
@media(max-width:680px){
  header{padding:.6rem 1rem}
  main{padding:1.5rem 1rem}
  .logo{font-size:.95rem}
}
</style>
</head>

// ── Render ───────────────────────────────────────────────────
function render() {
  const nav  = document.getElementById('nav');
  const main = document.getElementById('main');
  nav.innerHTML  = '';
  main.innerHTML = '';

  TABS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = t.icon + ' ' + t.label;
    btn.onclick = () => switchTab(t.id);
    nav.appendChild(btn);

    const div = document.createElement('div');
    div.className = 'tab' + (i === 0 ? ' active' : '');
    div.id = 'tab-' + t.id;
    div.innerHTML = CONTENT[t.id] || '<p style="color:var(--tx2)">준비 중</p>';
    main.appendChild(div);
  });
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  const idx = TABS.findIndex(t => t.id === id);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function toggleDay(hdr) {
  const body = hdr.nextElementSibling;
  body.classList.toggle('open');
}

function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'light' ? '' : 'light';
  document.documentElement.setAttribute('data-theme', t);
  document.querySelector('.theme-btn').textContent = t === 'light' ? '🌙 Dark' : '☀️ Light';
}

// ── Init ─────────────────────────────────────────────────────
render();
setTimeout(() => {
  document.getElementById('splash').classList.add('hide');
  // open day 1 by default
  const first = document.querySelector('.day-body');
  if (first) first.classList.add('open');
}, 1600);
</script>
